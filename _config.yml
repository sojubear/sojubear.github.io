title: Sojubear's Research Blog
description: > # this means to ignore newlines until "baseurl:"
  Write an awesome description for your new site here. You can edit this
  line in _config.yml. It will appear in your document head meta (for
  Google search results) and in your feed.xml site description.
permalink: ':title/'
baseurl: "/" # the subpath of your site, e.g. /blog
url: "https://sojubear.github.io/" # the base hostname & protocol for your site, e.g. http://example.com
site-twitter:  #if your site has a twitter account, enter it here

# Author Settings
author: Sojubear # add your name
author-img: placeholder.jpg # add your photo
about-author: Security Researcher | Threat Intelligence | I am a passionate and dedicated Cyber Threat Intelligence (CTI) analyst with a focus on building cutting-edge security frameworks and capabilities. With years of experience in both operational CTI analysis and the development of tools to enhance threat detection and response, I have honed my skills in adversary infrastructure research, malware analysis, and strategic threat intelligence. My work spans various sectors, and I am particularly focused on monitoring and mitigating threats posed by advanced persistent threats (APTs), including Russian and Chinese threat actors. My goal is to ensure that organizations can anticipate, identify, and respond to cyber threats with precision, using both human expertise and automated systems to maintain a resilient cybersecurity posture.
social-twitter: SSojubear # add your Twitter handle
#social-facebook: # add your Facebook handle
social-github:  sojubear # add your Github handle
social-linkedin: fernandezjeremy # add your Linkedin handle
social-email: sadpandaburger@gmail.com # add your Email address

# Disqus
discus-identifier: sojubear # add your discus identifier

# Tracker
analytics: # Google Analytics

# Build Settings
markdown: kramdown
plugins:
  - jekyll-sitemap
  - jekyll-paginate
  - jemoji

paginate: 8
paginate_path: "/page/:num"

exclude: ["node_modules", "gulpfile.js", "package.json", "yarn.lock"]

